# ─────────────────────────────────────────────
# BancoConfianza — Spring Boot Backend
#
# Para desarrollo local sin Supabase:
#   .\mvnw.cmd spring-boot:run -Dspring-boot.run.profiles=dev
#
# Para producción con Supabase, define las variables de entorno:
#   SUPABASE_DB_URL, SUPABASE_DB_USER, SUPABASE_DB_PASSWORD
# ─────────────────────────────────────────────

spring.application.name=homebanking-backend
server.port=8080

# ── Base de datos ──────────────────────────────
# Activa el perfil dev para usar H2 local, o define las variables de entorno
# para conectar a Supabase (ver application-dev.properties)
spring.datasource.url=${SUPABASE_DB_URL:jdbc:h2:mem:homebanking;DB_CLOSE_DELAY=-1;MODE=PostgreSQL}
spring.datasource.username=${SUPABASE_DB_USER:sa}
spring.datasource.password=${SUPABASE_DB_PASSWORD:}
spring.datasource.driver-class-name=${SUPABASE_DB_DRIVER:org.h2.Driver}

# ── JPA / Hibernate ────────────────────────────
# create-drop: crea tablas al arrancar, las borra al cerrar (perfecto para H2)
# Cuando uses Supabase/PostgreSQL real, cambia a: update
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ── H2 console ─────────────────────────────────
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── JWT ────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:MiClaveSecretaSuperSeguraParaBancoConfianza2026XYZ}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ── Supabase Auth (para validar JWTs RS256) ────
# Obtén la URL en: Supabase Dashboard → Project Settings → API → Project URL
supabase.url=${SUPABASE_URL:https://wxqqyitfomndkgtgorow.supabase.co}

# ── CORS ───────────────────────────────────────
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:3000,https://homebanking.bancoconfianza.pe,https://core.bancoconfianza.pe}

# ── Logging ────────────────────────────────────
logging.level.pe.bancoconfianza=DEBUG
logging.level.org.springframework.security=WARN