# ─────────────────────────────────────────────────────────────────────────
# BancoConfianza — Spring Boot Backend — PRODUCTION PROFILE
# ─────────────────────────────────────────────────────────────────────────
# Use: spring.profiles.active=prod

spring.application.name=homebanking-backend
server.port=8080

# ── Base de datos ──────────────────────────────────────────────────────
# REQUERIDO: Variables de entorno en producción
spring.datasource.url=${SUPABASE_DB_URL}
spring.datasource.username=${SUPABASE_DB_USER}
spring.datasource.password=${SUPABASE_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── HikariCP — Connection Pool ────────────────────────────────────────
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.initialization-fail-timeout=1

# ── JPA / Hibernate ───────────────────────────────────────────────────
# none: NO valida ni modifica el schema al iniciar
# validate: intenta conectar a BD (causará 500 si no hay conexión)
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ── JWT ─────────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ── Supabase URL (para validar JWTs RS256) ──────────────────────────
supabase.url=${SUPABASE_URL}

# ── CORS ────────────────────────────────────────────────────────────
app.cors.allowed-origins=${CORS_ORIGINS}

# ── Logging ─────────────────────────────────────────────────────────
logging.level.root=WARN
logging.level.pe.bancoconfianza=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.boot.autoconfigure.jdbc=WARN
logging.level.org.hibernate.SQL=WARN

# ── Security ────────────────────────────────────────────────────────
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=strict

# ── Compression ────────────────────────────────────────────────────
server.compression.enabled=true
server.compression.min-response-size=1024
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain

# ── Actuator ───────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.health.defaults.enabled=true
